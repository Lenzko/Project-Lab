<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Biobank</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
font-family:Segoe UI,Arial;
background:#f3f8f4;

}



.header{

background:#087830;
color:white;

padding:20px;

display:flex;
justify-content:space-between;
align-items:center;

}


.scan{

width:85px;
height:85px;

border-radius:50%;

border:0;

font-size:45px;

background:white;

cursor:pointer;

}



.search{

padding:20px;

}


input{

width:100%;
height:60px;

font-size:20px;

border-radius:15px;

border:2px solid #087830;

padding:15px;

}



#cameraView{

display:none;

width:100%;

border-radius:20px;

margin:20px;

}




.container{

margin:20px;

background:white;

padding:20px;

border-radius:25px;

}



.grid{

display:grid;

grid-template-columns:repeat(10,1fr);

gap:10px;

}




.rack,
.box,
.tube{

background:#e8f5ec;

border-radius:12px;

display:flex;

justify-content:center;

align-items:center;

cursor:pointer;

font-weight:bold;

}



.rack{

height:70px;

}



.box{

height:80px;

}



.tube{

height:65px;

font-size:10px;

padding:5px;

overflow:hidden;

text-align:center;

}




.active{

background:#00a651!important;

color:white;

}



.hidden{

display:none;

}




button{

background:#087830;

color:white;

border:0;

padding:12px 20px;

border-radius:12px;

}





/* nomor atas */


.col{

display:grid;

grid-template-columns:repeat(10,100px);

gap:5px;

margin-left:48px;

margin-bottom:10px;

}



.col div{

height:25px;

display:flex;

align-items:center;

justify-content:center;

font-weight:bold;

}





.cryo{

display:grid;

grid-template-columns:40px auto;

gap:8px;

}




.axis{

display:grid;

grid-template-rows:repeat(10,65px);

}



.axis div{

display:flex;

align-items:center;

justify-content:center;

font-weight:bold;

}




.tubeGrid{

display:grid;

grid-template-columns:repeat(10,100px);

gap:5px;

}





.profile{

position:fixed;

top:50%;

left:50%;


transform:translate(-50%,-50%);


background:white;

padding:25px;

width:350px;

border-radius:20px;

box-shadow:0 10px 30px #555;

display:none;

z-index:10;

}



.profile.show{

display:block;

}



</style>


</head>




<body>




<div class="header">


<h2>
🧬 SMART BIOBANK
</h2>


<button class="scan" onclick="camera()">

📷

</button>


</div>



<video id="cameraView"
autoplay
playsinline>

</video>







<div class="search">


<input

id="search"

placeholder="Cari kode tube..."

onkeyup="searchTube()">



</div>





<div class="container">






<div id="rackPage">


<h2>
🧊 FREEZER -80°C C
</h2>


<div id="rackGrid"
class="grid">

</div>



</div>








<div id="boxPage"
class="hidden">


<button onclick="backRack()">

⬅ Rak

</button>


<h2 id="rackTitle"></h2>


<div id="boxGrid"
class="grid">

</div>


</div>









<div id="tubePage"
class="hidden">


<button onclick="backBox()">

⬅ Box

</button>


<h2 id="boxTitle"></h2>





<div class="col">

<div>1</div>
<div>2</div>
<div>3</div>
<div>4</div>
<div>5</div>
<div>6</div>
<div>7</div>
<div>8</div>
<div>9</div>
<div>10</div>

</div>







<div class="cryo">


<div class="axis">

<div>1</div>
<div>2</div>
<div>3</div>
<div>4</div>
<div>5</div>
<div>6</div>
<div>7</div>
<div>8</div>
<div>9</div>
<div>10</div>

</div>





<div id="tubeGrid"
class="tubeGrid">

</div>



</div>



</div>





</div>







<div id="profile"
class="profile">


<h2>Identitas Tube</h2>


<p id="info"></p>


<button onclick="closeProfile()">

Tutup

</button>



</div>









<script>


let currentRack;
let currentBox;



const rackGrid =
document.getElementById("rackGrid");



const rackPage =
document.getElementById("rackPage");


const boxPage =
document.getElementById("boxPage");


const tubePage =
document.getElementById("tubePage");


const boxGrid =
document.getElementById("boxGrid");


const tubeGrid =
document.getElementById("tubeGrid");






// RAK 1-100

for(let i=1;i<=100;i++){


let r=document.createElement("div");


r.className="rack";

r.innerHTML="R"+i;


r.onclick=()=>openRack(i);


rackGrid.appendChild(r);


}








function openRack(r){


currentRack=r;


rackPage.classList.add("hidden");


boxPage.classList.remove("hidden");



rackTitle.innerHTML=
"RAK "+r;




boxGrid.innerHTML="";



for(let i=1;i<=10;i++){


let b=document.createElement("div");


b.className="box";

b.innerHTML="BOX "+i;


b.onclick=()=>openBox(i);



boxGrid.appendChild(b);



}



}









function openBox(b){


currentBox=b;


boxPage.classList.add("hidden");


tubePage.classList.remove("hidden");



boxTitle.innerHTML=

"RAK "
+currentRack+
" BOX "
+b;



tubeGrid.innerHTML="";




for(let row=1;row<=10;row++){


for(let col=1;col<=10;col++){



let pos=(row-1)*10+col;



let code=

"C045"

+

String(currentRack)
.padStart(3,"0")

+

"B"

+

String(currentBox)
.padStart(2,"0")

+

String(pos)
.padStart(3,"0");





let t=document.createElement("div");


t.className="tube";


t.innerHTML=code;


t.dataset.code=code;



t.onclick=()=>showTube(
code,
row,
col,
t
);



tubeGrid.appendChild(t);



}

}


}









function showTube(code,row,col,t){


document
.querySelectorAll(".tube")
.forEach(x=>x.classList.remove("active"));



t.classList.add("active");



info.innerHTML=

`

<b>ID Tube</b><br>

${code}

<br><br>

Freezer:
-80°C C

<br>

Rak:
${currentRack}

<br>

Box:
${currentBox}

<br>

Posisi:

Baris ${row}

Kolom ${col}

<br><br>

Status:

🟢 Tersimpan

`;



profile.classList.add("show");


}





function closeProfile(){

profile.classList.remove("show");

}




function backRack(){

boxPage.classList.add("hidden");

rackPage.classList.remove("hidden");

}




function backBox(){

tubePage.classList.add("hidden");

boxPage.classList.remove("hidden");

}









function searchTube(){


let key=
search.value.toUpperCase();



let data =
key.match(
/C045(\d{3})B(\d{2})(\d{3})/
);



if(!data)return;




let rack=parseInt(data[1]);

let box=parseInt(data[2]);




document
.querySelectorAll(".rack")
.forEach(x=>{


if(x.innerHTML=="R"+rack)

x.classList.add("active");


});



openRack(rack);



setTimeout(()=>{


openBox(box);



setTimeout(()=>{


document
.querySelectorAll(".tube")
.forEach(x=>{


if(x.dataset.code==key)

x.classList.add("active");


});


},300);



},300);



}








function camera(){



let video =
document.getElementById("cameraView");



video.style.display="block";



navigator.mediaDevices
.getUserMedia({

video:{
facingMode:"user"
}

})


.then(stream=>{


video.srcObject=stream;


})


.catch(()=>{

alert(
"Kamera tidak dapat dibuka"
);

});


}



</script>



</body>

</html>
