<!DOCTYPE html>
<html lang="id">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Biobank Freezer</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
font-family:"Segoe UI",Arial;
background:#f2f8f4;

}


/* HEADER */

.header{

background:#087830;
color:white;

padding:20px;

display:flex;
justify-content:space-between;
align-items:center;

}



.scan{

width:65px;
height:65px;

border:none;
border-radius:50%;

font-size:30px;

cursor:pointer;

}



/* SEARCH */


.search{

padding:20px;

}


.search input{

width:100%;

height:60px;

border-radius:18px;

border:2px solid #087830;

font-size:22px;

padding:15px;

}



/* CONTAINER */


.container{

margin:20px;

background:white;

border-radius:25px;

padding:20px;

box-shadow:0 5px 15px #ddd;

}



/* GRID */


.grid{

display:grid;

grid-template-columns:repeat(10,1fr);

gap:10px;

}



.rack,
.box,
.tube{

background:#e8f5ec;

border-radius:12px;

display:flex;

justify-content:center;
align-items:center;

cursor:pointer;

font-weight:bold;

transition:.3s;

}




.rack{

height:70px;

}



.box{

height:80px;

}



.tube{

height:60px;

font-size:12px;

padding:5px;

}



.active{

background:#00a651!important;

color:white!important;

transform:scale(1.05);

}



.hidden{

display:none;

}



button{

background:#087830;

color:white;

border:none;

padding:12px 20px;

border-radius:12px;

cursor:pointer;

}



@media(max-width:800px){

.grid{

grid-template-columns:repeat(5,1fr);

}

}



</style>

</head>



<body>



<div class="header">


<div>

<h1>🧬 SMART BIOBANK</h1>

<p>Thermo Scientific -80°C</p>

</div>


<button class="scan" onclick="camera()">

📷

</button>


</div>





<div class="search">

<input

id="search"

placeholder="Cari tube / box / rak"

onkeyup="searchData()">


</div>





<div class="container">



<!-- RAK -->


<div id="rackPage">


<h2>
🧊 FREEZER -80°C C
</h2>


<div id="rackGrid" class="grid">

</div>


</div>







<!-- BOX -->


<div id="boxPage" class="hidden">


<button onclick="backRack()">

⬅ Rak

</button>


<h2 id="rackTitle"></h2>


<div id="boxGrid" class="grid">

</div>


</div>









<!-- TUBE -->


<div id="tubePage" class="hidden">


<button onclick="backBox()">

⬅ Box

</button>


<h2 id="boxTitle"></h2>


<div id="tubeGrid" class="grid">

</div>


</div>



</div>







<script>


let currentRack;

let currentBox;



const rackGrid =
document.getElementById("rackGrid");


const rackPage =
document.getElementById("rackPage");


const boxPage =
document.getElementById("boxPage");


const tubePage =
document.getElementById("tubePage");



const boxGrid =
document.getElementById("boxGrid");


const tubeGrid =
document.getElementById("tubeGrid");






// ======================
// CREATE RAK 1-100
// ======================


for(let i=1;i<=100;i++){


let r =
document.createElement("div");


r.className="rack";

r.innerHTML="R"+i;



r.onclick=function(){

openRack(i);

}



rackGrid.appendChild(r);



}







function openRack(number){


currentRack=number;



rackPage.classList.add("hidden");


boxPage.classList.remove("hidden");


document
.getElementById("rackTitle")
.innerHTML=
"RAK "+number;




boxGrid.innerHTML="";



for(let i=1;i<=10;i++){


let b =
document.createElement("div");


b.className="box";

b.innerHTML=
"BOX "+i;


b.dataset.box=i;


b.onclick=function(){

openBox(i);

}



boxGrid.appendChild(b);


}



}








function openBox(number){


currentBox=number;



boxPage.classList.add("hidden");


tubePage.classList.remove("hidden");



document
.getElementById("boxTitle")
.innerHTML=

"RAK "
+currentRack+
" BOX "
+number;




tubeGrid.innerHTML="";



// 100 tube


for(let i=1;i<=100;i++){


let t =
document.createElement("div");


t.className="tube";



let code =

"C045"

+

String(currentRack)
.padStart(2,"0")

+

String(number)
.padStart(2,"0")

+

"B"

+

String(number)
.padStart(2,"0")

+

String(i)
.padStart(2,"0");



t.innerHTML=code;

t.dataset.code=code;



tubeGrid.appendChild(t);



}



}









function backRack(){


boxPage.classList.add("hidden");


rackPage.classList.remove("hidden");



}





function backBox(){


tubePage.classList.add("hidden");


boxPage.classList.remove("hidden");


}









// ======================
// SMART SEARCH
// ======================


function searchData(){


let key =
document
.getElementById("search")
.value
.toUpperCase();




// reset warna

document
.querySelectorAll(".rack,.box,.tube")
.forEach(x=>{

x.classList.remove("active");

});



if(key=="") return;





// RAK

if(key.startsWith("R")){


document
.querySelectorAll(".rack")
.forEach(r=>{


if(r.innerText==key)

r.classList.add("active");


});


}







// BOX

if(key.startsWith("BOX")){


document
.querySelectorAll(".box")
.forEach(b=>{


if(b.innerText==key)

b.classList.add("active");


});

}


 




// TUBE
// contoh C045034B0352


let data =
key.match(
/C045(\d{2})(\d{2})B(\d{2})/
);



if(data){


let rack =
parseInt(data[1]);


let box =
parseInt(data[2]);



// hijaukan rak


document
.querySelectorAll(".rack")
.forEach(r=>{


if(
r.innerText==
"R"+rack
){

r.classList.add("active");

}


});




// buka rak

openRack(rack);





setTimeout(()=>{


// box hijau


document
.querySelectorAll(".box")
.forEach(b=>{


if(
b.innerText==
"BOX "+box
){

b.classList.add("active");


openBox(box);


}

});





setTimeout(()=>{


document
.querySelectorAll(".tube")
.forEach(t=>{


if(
t.innerText==key
){

t.classList.add("active");

}


});


},200);



},200);



}



}






function camera(){

alert(
"Scanner QR siap diintegrasikan"
);


}



</script>


</body>

</html>
