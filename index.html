<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Biobank</title>


<style>


*{
box-sizing:border-box;
}


body{

margin:0;
font-family:Segoe UI,Arial;
background:#f3f8f4;

}



.header{

background:#087830;
color:white;

padding:20px;

display:flex;
justify-content:space-between;
align-items:center;

}


.scan{

width:65px;
height:65px;

border-radius:50%;
border:0;

font-size:30px;

}



.search{

padding:20px;

}


input{

width:100%;
height:60px;

border-radius:18px;

border:2px solid #087830;

font-size:20px;

padding:15px;

}




.container{

margin:20px;

background:white;

border-radius:25px;

padding:20px;

}




.grid{

display:grid;

grid-template-columns:repeat(10,1fr);

gap:10px;

}




.rack,
.box,
.tube{

background:#e8f5ec;

border-radius:12px;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

font-weight:bold;

transition:.3s;

}



.rack{

height:70px;

}


.box{

height:80px;

}



.tube{

height:60px;

font-size:12px;

}



.active{

background:#00a651!important;

color:white!important;

transform:scale(1.05);

}



.hidden{

display:none;

}




button{

background:#087830;
color:white;

border:0;

padding:12px 20px;

border-radius:12px;

}




/* CRYOBOX */


.cryoWrapper{

display:grid;

grid-template-columns:40px auto;

gap:10px;

}



.axis{

display:grid;

grid-template-rows:repeat(10,60px);

gap:5px;

}



.axis div{

display:flex;

justify-content:center;

align-items:center;

font-weight:bold;

}



.colAxis{

display:grid;

grid-template-columns:repeat(10,80px);

gap:5px;

margin-left:45px;

margin-bottom:10px;

}



.tubeGrid{

display:grid;

grid-template-columns:repeat(10,80px);

gap:5px;

}






/* PROFILE */


.profile{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:350px;

background:white;

padding:20px;

border-radius:25px;

box-shadow:0 10px 30px #555;

display:none;

z-index:10;

}



.profile.show{

display:block;

}



.profile img{

width:120px;

height:120px;

border-radius:15px;

object-fit:cover;

}



.close{

background:#087830;

color:white;

padding:10px;

border-radius:10px;

cursor:pointer;

}




@media(max-width:900px){


.grid{

grid-template-columns:repeat(5,1fr);

}


.tubeGrid,
.colAxis{

grid-template-columns:repeat(5,80px);

}



}



</style>

</head>



<body>



<div class="header">


<div>

<h2>🧬 SMART BIOBANK</h2>

<p>Thermo Scientific -80°C</p>

</div>


<button class="scan">

📷

</button>


</div>






<div class="search">


<input

id="search"

placeholder="Cari tube / box / rak"

onkeyup="searchData()">



</div>







<div class="container">





<div id="rackPage">


<h2>
🧊 FREEZER -80°C C
</h2>


<div id="rackGrid"
class="grid">

</div>


</div>







<div id="boxPage"
class="hidden">


<button onclick="backRack()">

⬅ Rak

</button>


<h2 id="rackTitle"></h2>


<div id="boxGrid"
class="grid">


</div>



</div>








<div id="tubePage"
class="hidden">


<button onclick="backBox()">

⬅ Box

</button>


<h2 id="boxTitle"></h2>



<div class="colAxis">

<div>1</div>
<div>2</div>
<div>3</div>
<div>4</div>
<div>5</div>
<div>6</div>
<div>7</div>
<div>8</div>
<div>9</div>
<div>10</div>


</div>




<div class="cryoWrapper">


<div class="axis">


<div>1</div>
<div>2</div>
<div>3</div>
<div>4</div>
<div>5</div>
<div>6</div>
<div>7</div>
<div>8</div>
<div>9</div>
<div>10</div>


</div>




<div id="tubeGrid"
class="tubeGrid">


</div>


</div>



</div>







</div>







<div id="profile"
class="profile">


<img src="https://via.placeholder.com/120">


<h2>Identitas Tube</h2>


<p id="tubeInfo"></p>


<div onclick="closeProfile()"
class="close">

Tutup

</div>



</div>









<script>



let currentRack;
let currentBox;



const rackGrid =
document.getElementById("rackGrid");


const rackPage =
document.getElementById("rackPage");


const boxPage =
document.getElementById("boxPage");


const tubePage =
document.getElementById("tubePage");



const boxGrid =
document.getElementById("boxGrid");


const tubeGrid =
document.getElementById("tubeGrid");







// RAK 1-100


for(let i=1;i<=100;i++){


let r=document.createElement("div");


r.className="rack";


r.innerHTML="R"+i;



r.onclick=()=>openRack(i);



rackGrid.appendChild(r);


}








function openRack(r){


currentRack=r;


rackPage.classList.add("hidden");

boxPage.classList.remove("hidden");


rackTitle.innerHTML=
"RAK "+r;



boxGrid.innerHTML="";



for(let i=1;i<=10;i++){


let b=document.createElement("div");


b.className="box";

b.innerHTML="BOX "+i;


b.onclick=()=>openBox(i);



boxGrid.appendChild(b);


}



}








function openBox(b){


currentBox=b;


boxPage.classList.add("hidden");


tubePage.classList.remove("hidden");



boxTitle.innerHTML=
"RAK "
+currentRack+
" BOX "
+b;




tubeGrid.innerHTML="";



for(let row=1;row<=10;row++){


for(let col=1;col<=10;col++){



let index=
(row-1)*10+col;



let t=document.createElement("div");


t.className="tube";



let code=

"C045"

+String(currentRack).padStart(2,"0")

+String(currentBox).padStart(2,"0")

+"B"

+String(index).padStart(2,"0");




t.innerHTML=index;



t.dataset.code=code;



t.onclick=()=>showTube(
code,
row,
col,
t
);



tubeGrid.appendChild(t);



}

}


}









function showTube(code,row,col,el){


document
.querySelectorAll(".tube")
.forEach(x=>x.classList.remove("active"));



el.classList.add("active");



tubeInfo.innerHTML=

`
<b>ID Tube:</b> ${code}

<br><br>

<b>Freezer:</b>
-80°C C

<br>

<b>Rak:</b>
${currentRack}

<br>

<b>Box:</b>
${currentBox}

<br>

<b>Posisi:</b>
Baris ${row}
Kolom ${col}

<br><br>

<b>Sampel:</b>
Plasma EDTA

<br>

<b>Status:</b>
🟢 Tersimpan

`;



profile.classList.add("show");



}





function closeProfile(){

profile.classList.remove("show");

}





function backRack(){

boxPage.classList.add("hidden");

rackPage.classList.remove("hidden");

}




function backBox(){

tubePage.classList.add("hidden");

boxPage.classList.remove("hidden");

}









function searchData(){


let key=
search.value.toUpperCase();



document
.querySelectorAll(".rack,.box,.tube")
.forEach(x=>{

x.classList.remove("active");

});



if(!key)return;





let data=
key.match(/C045(\d{2})(\d{2})B(\d{2})/);



if(data){


let r=parseInt(data[1]);

let b=parseInt(data[2]);





document
.querySelectorAll(".rack")
.forEach(x=>{


if(x.innerHTML=="R"+r)

x.classList.add("active");


});



openRack(r);



setTimeout(()=>{


document
.querySelectorAll(".box")
.forEach(x=>{


if(x.innerHTML=="BOX "+b)

x.classList.add("active");


});


openBox(b);



setTimeout(()=>{


document
.querySelectorAll(".tube")
.forEach(x=>{


if(x.dataset.code==key)

x.classList.add("active");


});


},200);



},200);



}



}






</script>


</body>
</html>
