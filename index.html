<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Biobank Freezer</title>


<style>


*{
box-sizing:border-box;
}


body{

margin:0;
font-family:"Segoe UI",Arial,sans-serif;
background:#f3f8f4;

}



/* HEADER */

.header{

background:#087830;
color:white;

height:95px;

display:flex;
justify-content:space-between;
align-items:center;

padding:20px;

box-shadow:0 4px 12px #999;

}


.header h1{

margin:0;
font-size:28px;

}


.header p{

margin:5px 0;

}



.scan{

width:65px;
height:65px;

border-radius:50%;

border:none;

font-size:32px;

background:white;

cursor:pointer;

}



/* SEARCH */


.search{

padding:20px;

}


.search input{

width:100%;

height:60px;

font-size:22px;

border-radius:18px;

border:2px solid #087830;

padding:15px;

}



/* FREEZER */


.freezer{

margin:20px;

background:white;

border-radius:25px;

padding:20px;

box-shadow:0 5px 15px #ddd;

}


.title{

font-size:24px;

font-weight:bold;

color:#087830;

}



/* RACK */


.racks{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-top:20px;

}


.rack{

background:#ffffff;

border-radius:20px;

padding:20px;

box-shadow:0 4px 12px #ddd;

transition:.4s;

cursor:pointer;

}



.rack.active{

background:#00a651;

color:white;

transform:scale(1.04);

}



.rack h2{

margin:0;

}



/* BOX */


.boxes{

display:none;

margin-top:15px;

animation:open .4s;

}



.rack.open .boxes{

display:block;

}



.box{

background:#e8f5ec;

padding:18px;

margin:10px 0;

border-radius:15px;

text-align:center;

font-weight:bold;

}



.box.target{

background:#00a651;

color:white;

}




@keyframes open{


0%{

opacity:0;
transform:translateY(-20px);

}


100%{

opacity:1;
transform:translateY(0);

}


}




@media(max-width:900px){


.racks{

grid-template-columns:1fr;

}


}



</style>

</head>


<body>


<div class="header">


<div>

<h1>🧬 SMART BIOBANK</h1>

<p>Thermo Scientific Freezer -80°C</p>

</div>



<button class="scan">

📷

</button>


</div>



<div class="search">


<input

id="search"

placeholder="Cari sample / rak / box..."

onkeyup="searchData()">


</div>





<div class="freezer">


<div class="title">

🧊 FREEZER -80°C A

</div>




<div class="racks">



<div class="rack">

<h2>Rak A</h2>

<div class="boxes">

<div class="box">BOX 01</div>
<div class="box">BOX 02</div>
<div class="box">BOX 03</div>
<div class="box">BOX 04</div>
<div class="box">BOX 05</div>


</div>

</div>





<div class="rack">

<h2>Rak B</h2>

<div class="boxes">

<div class="box">BOX 01</div>
<div class="box">BOX 02</div>
<div class="box">BOX 03</div>
<div class="box">BOX 04</div>
<div class="box">BOX 05</div>


</div>

</div>






<div class="rack">

<h2>Rak C</h2>

<div class="boxes">

<div class="box">BOX 01</div>
<div class="box">BOX 02</div>
<div class="box">BOX 03</div>
<div class="box">BOX 04</div>
<div class="box">BOX 05</div>


</div>

</div>




</div>


</div>





<script>


const racks =
document.querySelectorAll(".rack");



racks.forEach(rack=>{


rack.onclick=function(){


racks.forEach(r=>{

r.classList.remove("open");

});


rack.classList.toggle("open");


}


});





function searchData(){


let keyword =
document
.getElementById("search")
.value
.toLowerCase();



racks.forEach(rack=>{


rack.classList.remove("active");


let boxes =
rack.querySelectorAll(".box");



boxes.forEach(b=>{

b.classList.remove("target");

});




if(keyword.length>0 &&

rack.innerText
.toLowerCase()
.includes(keyword)

){


rack.classList.add("active");

rack.classList.add("open");



boxes.forEach(box=>{


if(
box.innerText
.toLowerCase()
.includes(keyword)

){

box.classList.add("target");

}


});

}


});


}



</script>



</body>

</html>
