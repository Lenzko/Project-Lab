<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Biobank Freezer</title>


<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Segoe UI,Arial;
background:#f3f8f4;

}


/* HEADER */

.header{

background:#087830;
color:white;

padding:20px;

display:flex;
justify-content:space-between;
align-items:center;

}


.header h1{
margin:0;
}


.scan{

width:65px;
height:65px;

border-radius:50%;
border:none;

font-size:30px;

cursor:pointer;

}



/* CAMERA */

#cameraBox{

display:none;

background:#000;
padding:10px;

}

video{

width:100%;
border-radius:20px;

}



/* SEARCH */

.search{

padding:20px;

}


input{

width:100%;
height:55px;

border-radius:15px;

border:2px solid #087830;

font-size:20px;

padding:15px;

}



/* FREEZER */

.freezer{

background:white;

margin:20px;

padding:20px;

border-radius:25px;

}


.title{

font-size:25px;

font-weight:bold;

color:#087830;

}



/* GRID RAK */


.rackGrid{

display:grid;

grid-template-columns:repeat(10,1fr);

gap:10px;

margin-top:20px;

}



.rack{

height:70px;

background:#e9f5ec;

border-radius:12px;

display:flex;

align-items:center;
justify-content:center;

font-weight:bold;

cursor:pointer;

transition:.3s;

}



.rack:hover{

transform:scale(1.05);

}



.rack.active{

background:#00a651;

color:white;

}




/* DETAIL RAK */


.detail{

display:none;

animation:open .5s;

}



.detail.show{

display:block;

}



.back{

background:#087830;
color:white;

padding:12px 20px;

border-radius:15px;

display:inline-block;

cursor:pointer;

margin-bottom:20px;

}



.boxGrid{

display:grid;

grid-template-columns:repeat(10,1fr);

gap:10px;

}



.box{

height:70px;

background:#e9f5ec;

border-radius:12px;

display:flex;

align-items:center;
justify-content:center;

font-weight:bold;

}



.box.target{

background:#00a651;
color:white;

}



@keyframes open{


from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}

}




@media(max-width:800px){


.rackGrid{

grid-template-columns:repeat(5,1fr);

}


.boxGrid{

grid-template-columns:repeat(5,1fr);

}

}


</style>

</head>


<body>


<div class="header">


<div>

<h1>🧬 SMART BIOBANK</h1>

<p>Thermo Scientific -80°C</p>

</div>


<button class="scan" onclick="openCamera()">

📷

</button>


</div>



<div id="cameraBox">

<video id="video" autoplay></video>

</div>



<div class="search">

<input

id="search"

placeholder="Cari rak / box..."

onkeyup="searchData()">


</div>





<div class="freezer">


<div class="title">

🧊 FREEZER -80°C A

</div>



<!-- GRID RAK -->

<div id="rackView">


<div class="rackGrid" id="rackGrid">


</div>


</div>






<!-- DETAIL -->

<div id="detail" class="detail">


<div class="back" onclick="backRack()">

⬅ Kembali Rak

</div>



<h2 id="rackTitle"></h2>



<div class="boxGrid" id="boxGrid">


</div>


</div>



</div>






<script>


let rackGrid =
document.getElementById("rackGrid");

let detail =
document.getElementById("detail");


let boxGrid =
document.getElementById("boxGrid");

let selectedRack="";





// buat rak 1-100

for(let i=1;i<=100;i++){


let r =
document.createElement("div");


r.className="rack";

r.innerHTML=
"R"+i;


r.onclick=function(){

openRack(i);

}


rackGrid.appendChild(r);


}





function openRack(number){


selectedRack=number;


document
.getElementById("rackView")
.style.display="none";


detail.classList.add("show");


document
.getElementById("rackTitle")
.innerHTML=
"Rak "+number;



boxGrid.innerHTML="";


// buat 10 box

for(let i=1;i<=10;i++){


let b =
document.createElement("div");


b.className="box";

b.innerHTML=
"BOX "+i;



boxGrid.appendChild(b);


}



}





function backRack(){


detail.classList.remove("show");


document
.getElementById("rackView")
.style.display="block";


}





function searchData(){


let key =
document
.getElementById("search")
.value
.toLowerCase();



document
.querySelectorAll(".rack")
.forEach(r=>{


r.classList.remove("active");


if(
r.innerText
.toLowerCase()
.includes(key)
&& key!=""
)

{

r.classList.add("active");

}


});


}





// CAMERA


function openCamera(){


let camera =
document.getElementById("cameraBox");


camera.style.display="block";


navigator.mediaDevices
.getUserMedia({

video:true

})

.then(stream=>{


document
.getElementById("video")
.srcObject=stream;


})


.catch(()=>{

alert("Kamera tidak tersedia");

});


}



</script>


</body>

</html>
